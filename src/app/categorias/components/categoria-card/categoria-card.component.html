<div
  class="card flex flex-col gap-3 transition-all duration-200 hover:shadow-md hover:border-primary-200"
  [class.opacity-60]="!categoria().activo"
>

  <!-- ── Encabezado: nombre + estado ─────────────────────────────────────── -->
  <div
    class="flex items-center justify-between gap-2 cursor-pointer group"
    (click)="irAFormulario()"
    (keydown.enter)="irAFormulario()"
    tabindex="0"
    role="button"
    [attr.aria-label]="'Editar categoría ' + categoria().nombre"
  >
    <h3 class="font-semibold text-gray-800 text-sm group-hover:text-primary-700 transition-colors">
      {{ categoria().nombre }}
    </h3>
    <app-status-badge [activo]="categoria().activo" />
  </div>

  <!-- ── Separador ────────────────────────────────────────────────────────── -->
  <div class="border-t border-gray-100"></div>

  <!-- ── Chips de subcategorías ──────────────────────────────────────────── -->
  <div class="flex flex-wrap gap-1.5 min-h-6">
    @for (sub of categoria().subcategorias; track sub.id) {
      <button
        type="button"
        class="chip-subcat"
        [class.chip-subcat--inactiva]="!sub.activo"
        (click)="irAFormulario()"
        [attr.aria-label]="'Editar subcategoría ' + sub.nombre"
      >
        {{ sub.nombre }}
      </button>
    } @empty {
      <span class="text-xs text-gray-400 italic self-center">Sin subcategorías</span>
    }
  </div>

  <!-- ── Quick-add (solo si la categoría está activa) ────────────────────── -->
  @if (categoria().activo) {
    <div class="border-t border-gray-100 pt-2">
      @if (!subcatFormVisible()) {
        <button
          type="button"
          class="text-xs text-primary-600 hover:text-primary-800 hover:underline transition-colors"
          (click)="subcatFormVisible.set(true)"
        >
          + Agregar subcategoría
        </button>
      } @else {
        <div class="flex gap-2 items-start">
          <div class="flex-1">
            <label [for]="'subcat-' + categoria().id" class="sr-only">
              Nombre de subcategoría para {{ categoria().nombre }}
            </label>
            <input
              [id]="'subcat-' + categoria().id"
              type="text"
              [value]="nuevoNombre()"
              (input)="nuevoNombre.set($any($event.target).value)"
              maxlength="100"
              placeholder="Ej: Quesos"
              autocomplete="off"
              class="w-full px-2 py-1.5 border border-gray-300 rounded-md text-xs bg-white
                     focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-primary-600
                     transition-colors"
              (keyup.enter)="crearSubcategoria()"
              (keyup.escape)="cancelarForm()"
              [attr.aria-describedby]="errorMsg() ? 'error-subcat-' + categoria().id : null"
            />
            @if (errorMsg()) {
              <p
                [id]="'error-subcat-' + categoria().id"
                class="text-red-600 text-xs mt-1"
                role="alert"
              >
                {{ errorMsg() }}
              </p>
            }
          </div>
          <button
            type="button"
            (click)="crearSubcategoria()"
            [disabled]="guardando()"
            class="btn-primary py-1.5 px-3 text-xs shrink-0"
          >
            {{ guardando() ? '…' : 'Agregar' }}
          </button>
          <button
            type="button"
            (click)="cancelarForm()"
            class="btn-secondary py-1.5 px-3 text-xs shrink-0"
          >
            Cancelar
          </button>
        </div>
      }
    </div>
  }

</div>
