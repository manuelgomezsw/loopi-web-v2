<div class="flex items-center gap-2">
  <label for="store-selector" class="sr-only">Seleccionar tienda</label>

  @if (cargando()) {
    <span class="text-sm text-gray-400" aria-busy="true">Cargando…</span>
  } @else if (error()) {
    <span class="text-sm text-red-600">Error al cargar tiendas.</span>
    <button
      type="button"
      class="text-sm text-primary-700 underline hover:text-primary-900 focus:outline-none focus:ring-2 focus:ring-primary-600"
      (click)="cargarTiendas()"
    >
      Reintentar
    </button>
  } @else {
    <div class="relative">
      <select
        id="store-selector"
        class="appearance-none cursor-pointer rounded-md border border-gray-300 bg-white pl-3 pr-8 py-1.5 text-sm text-gray-900 shadow-sm focus:border-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-600 transition-colors duration-200"
        [value]="valorActual"
        (change)="seleccionar($event)"
        aria-label="Seleccionar tienda"
      >
        <option value="">Vista consolidada</option>
        @for (tienda of tiendas(); track tienda.id) {
          <option [value]="tienda.id">{{ tienda.nombre }}</option>
        }
      </select>
      <span class="pointer-events-none absolute inset-y-0 right-2 flex items-center" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" class="h-4 w-4">
          <path d="M6 8l4 4 4-4" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  }
</div>
