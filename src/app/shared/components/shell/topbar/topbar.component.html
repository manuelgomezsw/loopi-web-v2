<header class="sticky top-0 z-30 flex h-16 items-center gap-4 border-b border-gray-200 bg-white px-4 shadow-sm">
  <!-- Botón hamburguesa: solo en mobile -->
  <button
    type="button"
    class="rounded-md p-1.5 text-gray-500 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:hidden"
    (click)="toggleMenu()"
    [attr.aria-expanded]="sidebarOpen"
    aria-controls="sidebar"
    aria-label="Abrir menú"
  >
    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Selector de tienda (solo admin) -->
  @if (esAdmin()) {
    <app-store-selector />
  } @else if (contextoTienda().tienda_id !== null) {
    <!-- Tienda fija para lider_tienda / barista -->
    <span class="text-sm font-medium text-gray-700">
      Tienda #{{ contextoTienda().tienda_id }}
    </span>
  }

  <!-- Espaciador -->
  <div class="flex-1"></div>

  <!-- Usuario y logout -->
  @if (sesion()) {
    <div class="flex items-center gap-3">
      <span class="hidden text-sm text-gray-600 sm:block">
        {{ sesion()!.rol | titlecase }}
      </span>
      <button
        type="button"
        class="rounded-md px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
        (click)="cerrarSesion()"
      >
        Cerrar sesión
      </button>
    </div>
  }
</header>
