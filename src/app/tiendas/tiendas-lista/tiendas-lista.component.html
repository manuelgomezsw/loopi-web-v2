<!-- Toast -->
@if (toastMsg()) {
  <div
    class="fixed top-4 right-4 z-50 px-4 py-3 rounded-md shadow-lg text-sm font-medium"
    [class.bg-green-100]="toastTipo() === 'verde'"
    [class.text-green-800]="toastTipo() === 'verde'"
    [class.bg-gray-100]="toastTipo() === 'neutro'"
    [class.text-gray-800]="toastTipo() === 'neutro'"
    [class.bg-red-100]="toastTipo() === 'rojo'"
    [class.text-red-800]="toastTipo() === 'rojo'"
    role="alert"
    aria-live="polite"
  >
    {{ toastMsg() }}
  </div>
}

<app-list-card>
  <app-page-header title="Tiendas">
    <a
      slot="actions"
      routerLink="/tiendas/nueva"
      class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-700"
    >
      + Nueva tienda
    </a>
  </app-page-header>

  <app-filter-bar
    [filters]="filterDefs"
    routeKey="/tiendas"
    (filtersChange)="onFilters($event)"
  />

  @if (errorMsg()) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4" role="alert">
      {{ errorMsg() }}
    </div>
  }

  @if (cargando()) {
    <div class="text-center py-12 text-gray-500">Cargando tiendas...</div>
  }

  @if (!cargando() && tiendas().length === 0 && !errorMsg()) {
    <app-empty-state
      title="No hay tiendas"
      description="Crea la primera tienda para empezar."
      actionLabel="+ Nueva tienda"
      (action)="router.navigate(['/tiendas/nueva'])"
    />
  }

  @if (!cargando() && tiendas().length > 0) {
    <app-data-table
      [columns]="cols"
      [rows]="tiendas()"
      (rowClick)="irAEditar($any($event).id)"
    >
      <ng-template appCellTemplate="activo" let-row>
        <app-status-badge [activo]="$any(row).activo" />
      </ng-template>
    </app-data-table>

    <app-pagination
      [page]="pagina()"
      [pageSize]="limite"
      [total]="total()"
      (pageChange)="onPage($event)"
    />
  }
</app-list-card>
